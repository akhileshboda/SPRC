<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events &amp; Programs — Kindred</title>
    <meta name="description"
        content="Browse upcoming community events, vocational programs, and educational opportunities for individuals with special needs. No account required.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap & Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        :root {
            --k-indigo: #4F62B0;
            --k-indigo-dk: #3a4a8a;
            --k-indigo-lt: #eef0fa;
            --k-teal: #2BB5A0;
            --k-teal-lt: #e4f7f4;
            --k-amber: #F5A623;
            --k-social: #C4375A;
            --k-social-lt: #fdedf1;
            --k-edu: #1565C0;
            --k-edu-lt: #e3eef9;
            --k-voc: #2E7D32;
            --k-voc-lt: #e6f4e7;
            --k-surface: #f7f8fc;
            --k-border: #e2e6f3;
            --k-text: #1a1d2e;
            --k-muted: #6b7280;
            --radius-card: 1rem;
            --radius-pill: 2rem;
            --shadow-card: 0 2px 16px rgba(79, 98, 176, 0.09);
            --shadow-card-hover: 0 8px 32px rgba(79, 98, 176, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--k-surface);
            color: var(--k-text);
            min-height: 100vh;
        }

        /* ── Page header ─────────────────────────────────────────── */
        #page-header {
            background: linear-gradient(135deg, #f0f2fc 0%, #e8f4f1 100%);
            border-bottom: 1px solid var(--k-border);
            padding: 3rem 0 2.5rem;
        }

        .page-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--k-indigo);
            background: var(--k-indigo-lt);
            border-radius: var(--radius-pill);
            padding: 0.3rem 0.8rem;
            border: 1px solid rgba(79, 98, 176, 0.2);
            margin-bottom: 0.75rem;
        }

        .page-title {
            font-size: clamp(1.75rem, 3.5vw, 2.5rem);
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--k-text);
            margin-bottom: 0.5rem;
        }

        .page-sub {
            font-size: 0.975rem;
            color: var(--k-muted);
            line-height: 1.65;
            max-width: 560px;
        }

        /* ── Sticky page-top wrapper (nav + filter bar as one unit) ── */
        #page-top {
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Nav inside wrapper no longer needs its own sticky */
        #page-top #mainNav {
            position: relative;
            top: auto;
        }

        /* ── Search & Filter ─────────────────────────────────────── */
        #filter-bar {
            background: #fff;
            border-bottom: 1px solid var(--k-border);
            padding: 1.1rem 0;
        }

        #searchBar {
            background: var(--k-surface);
            border: 1.5px solid var(--k-border);
            border-radius: var(--radius-pill);
            padding: 0.55rem 1.1rem 0.55rem 2.8rem;
            font-size: 0.88rem;
            color: var(--k-text);
            width: 100%;
            max-width: 420px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            font-family: 'Inter', system-ui, sans-serif;
        }

        #searchBar:focus {
            border-color: var(--k-indigo);
            box-shadow: 0 0 0 3px rgba(79, 98, 176, 0.12);
            background: #fff;
        }

        .search-wrapper {
            position: relative;
            flex: 0 1 420px;
            min-width: 0;
        }

        .search-wrapper .bi-search {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--k-muted);
            font-size: 0.85rem;
            pointer-events: none;
        }

        .filter-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-pill);
            border: 1.5px solid var(--k-border);
            background: #fff;
            color: var(--k-muted);
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Inter', system-ui, sans-serif;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.18s ease;
        }

        .filter-btn:hover {
            border-color: var(--k-indigo);
            color: var(--k-indigo);
            background: var(--k-indigo-lt);
        }

        .filter-btn.active {
            background: var(--k-indigo);
            border-color: var(--k-indigo);
            color: #fff;
        }

        .filter-btn[data-cat="Social"].active {
            background: var(--k-social);
            border-color: var(--k-social);
        }

        .filter-btn[data-cat="Educational"].active {
            background: var(--k-edu);
            border-color: var(--k-edu);
        }

        .filter-btn[data-cat="Vocational"].active {
            background: var(--k-voc);
            border-color: var(--k-voc);
        }

        /* ── Events grid ─────────────────────────────────────────── */
        #events-main {
            padding: 2.5rem 0 4rem;
        }

        #eventsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }

        .event-card {
            background: #fff;
            border: 1.5px solid var(--k-border);
            border-radius: var(--radius-card);
            padding: 1.5rem;
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .event-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-card-hover);
            border-color: rgba(79, 98, 176, 0.22);
        }

        .event-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .event-cat-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 0.28rem 0.7rem;
            border-radius: var(--radius-pill);
            flex-shrink: 0;
        }

        .cat-Social {
            background: var(--k-social-lt);
            color: var(--k-social);
        }

        .cat-Educational {
            background: var(--k-edu-lt);
            color: var(--k-edu);
        }

        .cat-Vocational {
            background: var(--k-voc-lt);
            color: var(--k-voc);
        }

        .cat-default {
            background: var(--k-indigo-lt);
            color: var(--k-indigo);
        }

        .upcoming-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #fff7e6;
            color: var(--k-amber);
            font-size: 0.68rem;
            font-weight: 700;
            padding: 0.22rem 0.6rem;
            border-radius: var(--radius-pill);
            border: 1px solid #fde9bb;
        }

        .upcoming-chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--k-amber);
            animation: pulse-dot 1.8s infinite;
        }

        .past-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #f3f4f6;
            color: #9ca3af;
            font-size: 0.68rem;
            font-weight: 700;
            padding: 0.22rem 0.6rem;
            border-radius: var(--radius-pill);
            border: 1px solid #e5e7eb;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.55;
                transform: scale(0.7);
            }
        }

        .event-card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--k-text);
            line-height: 1.35;
        }

        .event-meta-row {
            display: flex;
            align-items: flex-start;
            gap: 0.45rem;
            font-size: 0.8rem;
            color: var(--k-muted);
        }

        .event-meta-row i {
            font-size: 0.78rem;
            color: var(--k-indigo);
            flex-shrink: 0;
            line-height: 1.5;
            margin-top: 0.05rem;
        }

        .event-meta-text {
            min-width: 0;
            line-height: 1.5;
            overflow-wrap: anywhere;
        }

        .event-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-top: auto;
            flex-wrap: wrap;
        }

        .event-card-footer-meta {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-width: 0;
            flex: 1 1 12rem;
            flex-wrap: wrap;
        }

        .event-added-date {
            font-size: 0.72rem;
            color: var(--k-muted);
            line-height: 1.4;
        }

        .event-card-footer .btn {
            flex-shrink: 0;
        }

        .event-card-divider {
            border: none;
            border-top: 1px solid var(--k-border);
            margin: 0;
        }

        .event-accommodations-preview {
            font-size: 0.8rem;
            color: var(--k-muted);
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .event-cost-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: var(--k-teal-lt);
            color: var(--k-teal);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.65rem;
            border-radius: var(--radius-pill);
        }

        /* Empty / skeleton states */
        .events-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 1.5rem;
            color: var(--k-muted);
        }

        .events-empty .empty-icon {
            font-size: 3rem;
            color: var(--k-border);
            margin-bottom: 1rem;
        }

        .events-empty h5 {
            font-weight: 700;
            color: var(--k-text);
            font-size: 1rem;
            margin-bottom: 0.4rem;
        }

        .events-empty p {
            font-size: 0.875rem;
            max-width: 320px;
            margin: 0 auto;
        }

        .event-skeleton {
            background: #fff;
            border: 1.5px solid var(--k-border);
            border-radius: var(--radius-card);
            padding: 1.5rem;
            box-shadow: var(--shadow-card);
        }

        .skel-line {
            background: linear-gradient(90deg, #eff1f3 25%, #e2e6ec 50%, #eff1f3 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 0.4rem;
            height: 0.9rem;
            margin-bottom: 0.6rem;
        }

        .skel-line.short {
            width: 40%;
        }

        .skel-line.med {
            width: 65%;
        }

        .skel-line.full {
            width: 100%;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        #resultsCount {
            font-size: 0.8rem;
            color: var(--k-muted);
            font-weight: 500;
        }

        /* ── Footer ──────────────────────────────────────────────── */
        footer {
            background: #fff;
            border-top: 1px solid var(--k-border);
            padding: 1.75rem 0;
        }

        .footer-logo {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--k-indigo);
        }

        .footer-logo span {
            color: var(--k-teal);
        }

        .fade-in {
            animation: fadeInUp 0.4s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 576px) {
            #eventsGrid {
                grid-template-columns: 1fr;
            }

            .event-card-footer {
                align-items: stretch;
            }

            .event-card-footer .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- ════════════ STICKY HEADER (nav + filter bar) ════════════ -->
    <div id="page-top">
        <div id="nav-root"></div>

        <div id="filter-bar" role="search" aria-label="Filter events">
            <div class="container d-flex flex-wrap align-items-center justify-content-between gap-3">

                <div class="search-wrapper">
                    <i class="bi bi-search"></i>
                    <input type="search" id="searchBar" placeholder="Search events, locations, or keywords…"
                        autocomplete="off" aria-label="Search events">
                </div>

                <div class="d-flex flex-wrap gap-2 align-items-center">
                    <button class="filter-btn active" data-cat="All" aria-pressed="true">
                        <i class="bi bi-grid-3x3-gap"></i> All
                    </button>
                    <button class="filter-btn" data-cat="Social" aria-pressed="false">
                        <i class="bi bi-people"></i> Social
                    </button>
                    <button class="filter-btn" data-cat="Educational" aria-pressed="false">
                        <i class="bi bi-book"></i> Educational
                    </button>
                    <button class="filter-btn" data-cat="Vocational" aria-pressed="false">
                        <i class="bi bi-briefcase"></i> Vocational
                    </button>
                </div>

            </div>
        </div>
    </div><!-- /#page-top -->

    <!-- ════════════ PAGE HEADER ════════════ -->
    <header id="page-header" aria-labelledby="page-title">
        <div class="container">
            <div class="page-eyebrow"><i class="bi bi-calendar2-event"></i> Live Opportunity Board</div>
            <h1 class="page-title" id="page-title">Community Events &amp; Programs</h1>
            <p class="page-sub">
                Browse verified opportunities published by Kindred coordinators — open to all.
                No sign-in required.
            </p>
        </div>
    </header>

    <!-- ════════════ EVENTS GRID ════════════ -->
    <main id="events-main">
        <div class="container">
            <div id="guardianEventTargetPanel" class="card border-primary-subtle mb-3 d-none">
                <div class="card-body py-3">
                    <label for="guardianEventParticipantSelect" class="form-label small text-muted mb-2">Guardian mode: choose which linked participant you are saving events for</label>
                    <select id="guardianEventParticipantSelect" class="form-select"></select>
                </div>
            </div>
            <p id="resultsCount" class="mb-3" aria-live="polite" aria-atomic="true"></p>
            <div id="eventsGrid" role="list" aria-label="Community events"></div>
        </div>
    </main>

    <!-- ════════════ FOOTER ════════════ -->
    <footer>
        <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
            <div>
                <div class="footer-logo">Kindred<span>.</span></div>
                <small class="d-block mt-1" style="color:#6b7280;">Special Population Resource Connection</small>
            </div>
            <small style="color:#6b7280;" class="text-center text-md-end">
                CNIT 280 Term Project &mdash; Akhilesh Boda, Ken Mori, Sannidhi Sangisetti, Jayan Srinivasan
            </small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/auth.js?v=8"></script>
    <script>
        // Scroll shadow is handled by js/nav.js

        // ── Events browser ────────────────────────────────────────────────────────
        let allEvents = [];
        let activeFilter = 'All';
        let searchQuery = '';
        let currentSession = null;
        let interestedEventIds = new Set();
        let guardianParticipantSelectEl = null;

        function escapeHtml(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function isUpcoming(event) {
            try {
                const ts = new Date(String(event.dateTime || '')).getTime();
                return !isNaN(ts) && ts >= Date.now();
            } catch { return false; }
        }

        function actionButton(event, upcoming) {
            if (!upcoming) return '';
            if (!currentSession) {
                return `<a class="btn btn-sm btn-primary" style="border-radius:2rem;font-size:0.75rem;padding:0.25rem 0.85rem;" href="login.html">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Login to save
                </a>`;
            }
            if (currentSession.role === 'GUARDIAN') {
                const disabled = guardianParticipantSelectEl?.value ? '' : 'disabled';
                return `<button class="btn btn-sm btn-primary js-event-toggle-btn" data-event-id="${escapeHtml(event.id)}" data-event-title="${escapeHtml(event.title)}" ${disabled} style="border-radius:2rem;font-size:0.75rem;padding:0.25rem 0.85rem;">
                    <i class="bi bi-people me-1"></i>Save for participant
                </button>`;
            }
            if (currentSession.role !== 'PARTICIPANT') {
                return `<button class="btn btn-sm btn-outline-secondary" style="border-radius:2rem;font-size:0.75rem;padding:0.25rem 0.85rem;" disabled title="Participants or guardians can save event interests">
                    Restricted
                </button>`;
            }
            if (interestedEventIds.has(String(event.id))) {
                return `<button class="btn btn-sm btn-outline-danger js-event-toggle-btn" data-event-id="${escapeHtml(event.id)}" data-event-title="${escapeHtml(event.title)}" style="border-radius:2rem;font-size:0.75rem;padding:0.25rem 0.85rem;">
                    <i class="bi bi-x-circle me-1"></i>Not interested
                </button>`;
            }
            return `<button class="btn btn-sm btn-primary js-event-toggle-btn" data-event-id="${escapeHtml(event.id)}" data-event-title="${escapeHtml(event.title)}" style="border-radius:2rem;font-size:0.75rem;padding:0.25rem 0.85rem;">
                <i class="bi bi-hand-thumbsup me-1"></i>I'm Interested
            </button>`;
        }

        function renderEventCard(event) {
            const catCls = event.category ? `cat-${event.category}` : 'cat-default';
            const catIcon = { Social: 'bi-people-fill', Educational: 'bi-book-fill', Vocational: 'bi-briefcase-fill' }[event.category] || 'bi-calendar2-event';
            const upcoming = isUpcoming(event);
            const statusChip = upcoming
                ? `<span class="upcoming-chip"><span class="dot"></span>Upcoming</span>`
                : `<span class="past-chip">Past</span>`;

            return `
        <article class="event-card fade-in" role="listitem" aria-label="${escapeHtml(event.title)}">
          <div class="event-card-header">
            <span class="event-cat-badge ${escapeHtml(catCls)}">
              <i class="bi ${escapeHtml(catIcon)}"></i>
              ${escapeHtml(event.category || 'Event')}
            </span>
            ${statusChip}
          </div>

          <div class="event-card-title">${escapeHtml(event.title)}</div>

          <div class="d-flex flex-column gap-1">
            ${event.dateTimeLabel ? `<div class="event-meta-row"><i class="bi bi-calendar3"></i><span class="event-meta-text">${escapeHtml(event.dateTimeLabel)}</span></div>` : ''}
            ${event.location ? `<div class="event-meta-row"><i class="bi bi-geo-alt"></i><span class="event-meta-text">${escapeHtml(event.location)}</span></div>` : ''}
          </div>

          <hr class="event-card-divider">

          <div class="event-accommodations-preview" title="Requirements &amp; accommodations">
            ${escapeHtml(event.accommodations || '—')}
          </div>

          <div class="event-card-footer">
            <div class="event-card-footer-meta">
              ${event.cost ? `<span class="event-cost-chip"><i class="bi bi-tag"></i>${escapeHtml(event.cost)}</span>` : ''}
              <span class="event-added-date">Added ${escapeHtml(event.dateAdded || '')}</span>
            </div>
            ${actionButton(event, upcoming)}
          </div>
        </article>`;
        }

        async function refreshInterestedEventIds() {
            if (!currentSession || currentSession.role !== 'PARTICIPANT') {
                interestedEventIds = new Set();
                return;
            }
            interestedEventIds = new Set(await Auth.getInterestedEventIds());
        }

        function wireEventToggleButtons() {
            document.querySelectorAll('.js-event-toggle-btn').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    btn.disabled = true;
                    const options = currentSession?.role === 'GUARDIAN' ? { participantId: guardianParticipantSelectEl?.value } : {};
                    const result = await Auth.toggleEventInterest(btn.dataset.eventId, btn.dataset.eventTitle, options);
                    if (!result.success) {
                        alert(result.message || 'Could not update event interest.');
                        btn.disabled = false;
                        return;
                    }
                    await refreshInterestedEventIds();
                    filterAndRender();
                });
            });
        }

        function renderSkeletons(n = 6) {
            return Array.from({ length: n }, () => `
        <div class="event-skeleton" aria-hidden="true">
          <div class="skel-line short mb-3"></div>
          <div class="skel-line med"></div>
          <div class="skel-line full" style="height:0.7rem;margin-bottom:1rem;"></div>
          <div class="skel-line short" style="height:0.7rem;"></div>
          <div class="skel-line med"   style="height:0.7rem;"></div>
        </div>`).join('');
        }

        function filterAndRender() {
            const grid = document.getElementById('eventsGrid');
            const countEl = document.getElementById('resultsCount');
            const query = searchQuery.toLowerCase().trim();

            const filtered = allEvents.filter(ev => {
                if (activeFilter !== 'All' && ev.category !== activeFilter) return false;
                if (!query) return true;
                return (
                    (ev.title || '').toLowerCase().includes(query) ||
                    (ev.location || '').toLowerCase().includes(query) ||
                    (ev.category || '').toLowerCase().includes(query) ||
                    (ev.accommodations || '').toLowerCase().includes(query)
                );
            });

            if (filtered.length === 0) {
                grid.innerHTML = allEvents.length === 0
                    ? `<div class="events-empty">
               <div class="empty-icon"><i class="bi bi-calendar2-x"></i></div>
               <h5>No events yet</h5>
               <p>Coordinators will publish upcoming opportunities here. Check back soon!</p>
             </div>`
                    : `<div class="events-empty">
               <div class="empty-icon"><i class="bi bi-search"></i></div>
               <h5>No results found</h5>
               <p>Try adjusting your search or clearing the category filter.</p>
             </div>`;
                countEl.textContent = '';
            } else {
                grid.innerHTML = filtered.map(renderEventCard).join('');
                const label = activeFilter === 'All' ? 'event' : activeFilter.toLowerCase() + ' event';
                countEl.textContent = `Showing ${filtered.length} ${label}${filtered.length !== 1 ? 's' : ''}${query ? ` for "${searchQuery}"` : ''}`;
            }
            wireEventToggleButtons();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            currentSession = await Auth.getSession();
            guardianParticipantSelectEl = document.getElementById('guardianEventParticipantSelect');
            
            const signinBtn = document.getElementById('nav-signin-btn');
            if (signinBtn && currentSession) {
                signinBtn.innerHTML = '<i class="bi bi-arrow-left me-1"></i>Back to Dashboard';
                signinBtn.href = 'dashboard.html';
            }

            if (currentSession?.role === 'GUARDIAN') {
                const linkedParticipants = await Auth.getLinkedParticipantsForCurrentUser();
                const panel = document.getElementById('guardianEventTargetPanel');
                if (panel && guardianParticipantSelectEl) {
                    panel.classList.remove('d-none');
                    guardianParticipantSelectEl.innerHTML = linkedParticipants.length
                        ? linkedParticipants.map((participant) => `<option value="${escapeHtml(participant.id)}">${escapeHtml(participant.fullName)}</option>`).join('')
                        : '<option value="">No linked participants</option>';
                    guardianParticipantSelectEl.addEventListener('change', filterAndRender);
                }
            }
            
            const grid = document.getElementById('eventsGrid');
            grid.innerHTML = renderSkeletons(6);
            await new Promise(r => setTimeout(r, 180));

            allEvents = await Auth.getEvents();
            await refreshInterestedEventIds();

            // Wire search
            const searchInput = document.getElementById('searchBar');
            searchInput.addEventListener('input', () => {
                searchQuery = searchInput.value;
                filterAndRender();
            });

            // Wire category filters
            document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeFilter = btn.dataset.cat;
                    document.querySelectorAll('.filter-btn[data-cat]').forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-pressed', 'false');
                    });
                    btn.classList.add('active');
                    btn.setAttribute('aria-pressed', 'true');
                    filterAndRender();
                });
            });

            filterAndRender();
        });
    </script>

</body>

</html>
