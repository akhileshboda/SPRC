<!-- ══ SECTION: Users (ADMIN only) ══ -->
<section id="section-users" class="content-section d-none">

  <!-- LIST sub-view (default) -->
  <div id="view-users-list">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="text-primary fw-semibold mb-0">System Users</h5>
      <button id="newUserBtn" class="btn btn-primary btn-sm" type="button">
        <i class="bi bi-plus-lg me-1"></i>New User
      </button>
    </div>
    <div class="card shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th scope="col" class="ps-3">Name</th>
              <th scope="col">Email</th>
              <th scope="col">Role</th>
              <th scope="col">Date Added</th>
              <th scope="col" class="text-end pe-3" style="width: 1%; white-space: nowrap;">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- FORM sub-view (hidden by default) -->
  <div id="view-users-form" class="d-none">
    <div class="d-flex align-items-center mb-3">
      <button id="backToUsersBtn" class="btn btn-outline-secondary btn-sm me-3" type="button">
        <i class="bi bi-arrow-left me-1"></i>Back
      </button>
      <h5 class="text-primary fw-semibold mb-0" id="userFormTitle">New User</h5>
    </div>
    <div class="card shadow-sm">
      <div class="card-body">

        <div id="registerError" class="alert alert-danger d-none" role="alert"></div>

        <form id="registerForm" novalidate>
          <div class="row g-3">

            <div class="col-md-3">
              <label for="regFirstName" class="form-label">First Name</label>
              <input type="text" class="form-control" id="regFirstName" placeholder="e.g. Amy" required>
              <div class="invalid-feedback">First name is required.</div>
            </div>

            <div class="col-md-3">
              <label for="regLastName" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="regLastName" placeholder="e.g. Martin" required>
              <div class="invalid-feedback">Last name is required.</div>
            </div>

            <div class="col-md-6">
              <label for="regEmail" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="regEmail" placeholder="email@example.com" required>
              <div class="invalid-feedback">A valid email address is required.</div>
            </div>

            <div class="col-md-6">
              <label for="regPassword" class="form-label">Temporary Password</label>
              <input type="password" class="form-control" id="regPassword" placeholder="Temporary password" required>
              <div class="invalid-feedback">Password is required.</div>
            </div>

            <div class="col-md-6">
              <label for="regRole" class="form-label">Role</label>
              <select class="form-select" id="regRole" required>
                <option value="" disabled selected>Select a role&hellip;</option>
                <option value="ADMIN">Administrator &ndash; Full system access</option>
                <option value="GUARDIAN">Guardian &ndash; Linked participant management and approvals</option>
                <option value="PARTICIPANT">Participant &ndash; Personal profile and curated opportunities</option>
                <option value="VOLUNTEER">Volunteer &ndash; Events and task updates</option>
              </select>
              <div class="invalid-feedback">Please select a role.</div>
            </div>

            <div class="col-md-6 d-none" id="userParticipantLinkWrap">
              <label for="userParticipantLinkId" class="form-label">Link To Existing Participant Record</label>
              <select class="form-select" id="userParticipantLinkId">
                <option value="" selected>No participant record link</option>
              </select>
            </div>

            <div class="col-md-6 d-none" id="userVolunteerLinkWrap">
              <label for="userVolunteerLinkId" class="form-label">Link To Existing Volunteer Profile</label>
              <select class="form-select" id="userVolunteerLinkId">
                <option value="" selected>No volunteer profile link</option>
              </select>
            </div>

            <div class="col-12">
              <button type="submit" class="btn btn-primary" id="userSubmitBtn">Create Account</button>
            </div>

          </div>
        </form>

      </div>
    </div>
  </div>

</section>
