<!-- ══ SECTION: Participant — My Inquiries ══ -->
<section id="section-p-inquiries" class="content-section d-none">
  <div class="mb-3">
    <h5 class="portal-section-title mb-0"><i class="bi bi-chat-left-text me-2 text-success"></i>My Inquiries</h5>
    <p class="text-muted small mb-0">Submit a question or request to the Kindred team.</p>
  </div>
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-success text-white fw-semibold">New Inquiry</div>
    <div class="card-body">
      <div id="inquirySuccess" class="alert alert-success d-none" role="alert"></div>
      <div id="inquiryError"   class="alert alert-danger  d-none" role="alert"></div>
      <form id="inquiryForm" novalidate>
        <div class="mb-3">
          <label for="inquirySubject" class="form-label">Subject <span class="text-muted fw-normal">(optional)</span></label>
          <input type="text" class="form-control" id="inquirySubject" placeholder="Brief subject line">
        </div>
        <div class="mb-3">
          <label for="inquiryDescription" class="form-label">Your message <span class="text-danger">*</span></label>
          <textarea class="form-control" id="inquiryDescription" rows="5"
            placeholder="Describe your question or request…" required></textarea>
          <div class="invalid-feedback">Please enter your inquiry message.</div>
        </div>
        <button type="submit" class="btn btn-success" id="inquirySubmitBtn">
          <i class="bi bi-send me-2"></i>Submit Inquiry
        </button>
      </form>
    </div>
  </div>
  <div class="card shadow-sm">
    <div class="card-header fw-semibold bg-light"><i class="bi bi-clock-history me-2"></i>My Submitted Inquiries</div>
    <div class="card-body p-3" id="myInquiriesList">
      <p class="text-muted small mb-0">Loading…</p>
    </div>
  </div>
</section>
